# Phase 1 / Step 7: lab Ansible 設定
[defaults]
inventory = inventory.yml
roles_path = roles
host_key_checking = False
interpreter_python = auto_silent
remote_user = admin

[privilege_escalation]
# admin は VM 側で NOPASSWD sudo (cloud-init設定) なのでパスワード不要
become = True
become_method = sudo
become_user = root
