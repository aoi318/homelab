---
- name: rsyslog remote receiver (imtcp 514 -> /var/log/remote)
  ansible.builtin.copy:
    src: 60-remote.conf
    dest: /etc/rsyslog.d/60-remote.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart rsyslog

- name: log-rotate cleanup script
  ansible.builtin.copy:
    src: remote-log-rotate.sh
    dest: /usr/local/sbin/remote-log-rotate.sh
    owner: root
    group: root
    mode: "0755"

- name: log-rotate service unit
  ansible.builtin.copy:
    src: remote-log-rotate.service
    dest: /etc/systemd/system/remote-log-rotate.service
    owner: root
    group: root
    mode: "0644"

- name: log-rotate timer unit
  ansible.builtin.copy:
    src: remote-log-rotate.timer
    dest: /etc/systemd/system/remote-log-rotate.timer
    owner: root
    group: root
    mode: "0644"

- name: enable + start log-rotate timer
  ansible.builtin.systemd:
    name: remote-log-rotate.timer
    enabled: true
    state: started
    daemon_reload: true
